<script type="module">
  // 1. IMPORT FIREBASE SDKS
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 2. YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyC3XBioqVEUNCT1GQohWHHydGQK4GicEg0",
    authDomain: "pulseid-30a49.firebaseapp.com",
    projectId: "pulseid-30a49",
    storageBucket: "pulseid-30a49.firebasestorage.app",
    messagingSenderId: "92348791758",
    appId: "1:92348791758:web:54530587e62db50170899f",
    measurementId: "G-WTKLRJ1488"
  };

  // 3. INITIALIZE FIREBASE & FIRESTORE
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  console.log("✅ Firebase initialized successfully");

  // 4. THE UNIVERSAL DATABASE LOGIC
  const DB = {
    get(key){ 
      try{ 
        return JSON.parse(localStorage.getItem('pulseid_'+key)||'null'); 
      }catch(e){ 
        return null; 
      } 
    },
    set(key,val){ 
      localStorage.setItem('pulseid_'+key, JSON.stringify(val)); 
    },
    
    getPatient(){ 
      return this.get('patient') || {
        name:'',roll:'',dob:'',gender:'',blood:'',height:'',weight:'',
        ecName:'',ecPhone:'',ecRel:'',conditions:'',notes:'',
        allergies:[],medications:[]
      }; 
    },

    getVisits(roll = null){ 
      const allVisits = this.get('visits') || [];
      if(roll) return allVisits.filter(v => v.roll.toUpperCase() === roll.toUpperCase());
      return allVisits;
    },

    saveVisit(v){ 
      const vs = this.get('visits') || []; 
      vs.unshift(v); 
      this.set('visits', vs); 
      this.syncToCloud('visit', v); 
    },

    savePatient(p){ 
      this.set('patient', p); 
      this.syncToCloud('patient', p);
    },

    async syncToCloud(type, data) {
      try {
        const docId = type === 'patient' ? data.roll : data.id;
        if (!docId) {
          console.warn("No docId for sync");
          return;
        }
        await setDoc(doc(db, type + "s", docId.toUpperCase()), data);
        console.log(`✅ [PulseID] ${type} synced to cloud:`, docId);
        showToast(`✓ Synced to cloud`, 'green');
      } catch (e) {
        console.error("❌ Cloud sync error:", e);
        showToast(`Cloud sync failed: ${e.message}`, 'red');
      }
    }
  };

  // 5. GLOBAL STATE
  let currentPortal = null;
  let visitTargetRoll = null;
  let rxRowCount = 0;
  let currentViewingPatient = null;

  // 6. UI HELPER FUNCTIONS
  function showToast(msg, type = 'green') { 
    const t = document.getElementById('toast'); 
    t.textContent = msg; 
    t.className = `toast ${type} show`; 
    setTimeout(() => t.classList.remove('show'), 3000); 
  }

  function closeModal(id) { 
    document.getElementById(id).classList.remove('open'); 
  }

  function formatDate(iso) { 
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-IN'); 
  }

  function initials(name) { 
    return name ? name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : '?'; 
  }

  // 7. PORTAL NAVIGATION
  function enterPortal(type) {
    document.getElementById('landing').style.display = 'none';
    currentPortal = type;
    const shell = document.getElementById(type + '-shell');
    shell.classList.add('active');
    
    if (type === 'patient') { 
      loadPatientPortal(); 
    } else { 
      loadDoctorPortal(); 
    }
  }

  function goHome() {
    document.getElementById('landing').style.display = 'flex';
    document.getElementById('patient-shell').classList.remove('active');
    document.getElementById('doctor-shell').classList.remove('active');
    currentPortal = null;
  }

  function showPage(portal, page, btn) {
    document.querySelectorAll('#' + portal + '-shell .page').forEach(p => p.classList.remove('active'));
    const el = document.getElementById(portal + '-page-' + page);
    if (el) el.classList.add('active');
    
    if (btn) {
      document.querySelectorAll('#' + portal + '-shell .nav-item').forEach(n => n.classList.remove('active'));
      btn.classList.add('active');
    }
    
    // Load page-specific content
    if (portal === 'p') {
      if (page === 'dashboard') loadPatientDashboard();
      else if (page === 'history') renderPatientHistory();
      else if (page === 'medications') renderMedList();
      else if (page === 'allergies') renderAllergyList();
      else if (page === 'qr') renderQR();
    } else {
      if (page === 'dashboard') loadDoctorDashboard();
      else if (page === 'patients') renderPatientList();
      else if (page === 'visits') renderVisitLog();
    }
  }

  // 8. PATIENT PORTAL FUNCTIONS
  function loadPatientPortal() { 
    loadProfileFields(); 
    loadPatientDashboard(); 
  }

  function loadProfileFields() {
    const p = DB.getPatient();
    const fields = ['name', 'roll', 'dob', 'gender', 'blood', 'height', 'weight', 'ecName', 'ecPhone', 'ecRel', 'conditions', 'notes'];
    fields.forEach(f => {
      const el = document.getElementById('p-' + f);
      if (el) el.value = p[f] || '';
    });
  }

  async function saveProfile() {
    const p = DB.getPatient();
    const fields = ['name', 'roll', 'dob', 'gender', 'blood', 'height', 'weight', 'ecName', 'ecPhone', 'ecRel', 'conditions', 'notes'];
    fields.forEach(f => {
      const el = document.getElementById('p-' + f);
      if (el) p[f] = el.value.trim();
    });
    
    DB.savePatient(p);
    updatePatientNav(p);
    showToast('✓ Profile saved successfully!', 'green');
    
    // Refresh dashboard
    loadPatientDashboard();
  }

  function updatePatientNav(p) {
    const init = p.name ? initials(p.name) : '?';
    const avInit = document.getElementById('p-av-init');
    const avName = document.getElementById('p-av-name');
    if (avInit) avInit.textContent = init;
    if (avName) avName.textContent = p.name || 'My Profile';
  }

  function loadPatientDashboard() {
    const p = DB.getPatient();
    const vs = DB.getVisits(p.roll);
    
    // Update stats
    document.getElementById('p-stat-visits').textContent = vs.length;
    document.getElementById('p-stat-meds').textContent = p.medications?.filter(m => m.status === 'active').length || 0;
    document.getElementById('p-stat-allergy').textContent = p.allergies?.length || 0;
    document.getElementById('p-stat-cond').textContent = p.conditions ? p.conditions.split(',').filter(c => c.trim()).length : 0;
    
    // Update greeting
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('p-dash-greeting').textContent = `${greeting}, ${p.name?.split(' ')[0] || ''}.`;
    
    // Show onboarding prompt if profile incomplete
    const prompt = document.getElementById('p-onboard-prompt');
    if (prompt) {
      prompt.style.display = (p.name && p.roll && p.blood) ? 'none' : 'block';
    }
    
    // Critical info
    const criticalDiv = document.getElementById('p-critical-info');
    if (criticalDiv) {
      if (p.allergies?.length || p.conditions) {
        criticalDiv.innerHTML = `
          ${p.allergies?.length ? `<div class="tag tag-red" style="margin-bottom:8px;">⚠ ${p.allergies.length} allergies</div>` : ''}
          ${p.conditions ? `<div><strong>Conditions:</strong> ${p.conditions}</div>` : ''}
          <div style="margin-top:8px;"><strong>Blood Group:</strong> ${p.blood || 'Not set'}</div>
          <div><strong>Emergency Contact:</strong> ${p.ecName || 'Not set'} ${p.ecPhone ? '· ' + p.ecPhone : ''}</div>
        `;
      } else {
        criticalDiv.innerHTML = `<div class="empty"><div class="empty-icon">🩺</div><p>No profile set up yet. Add your details in My Profile.</p></div>`;
      }
    }
    
    // Recent activity
    const recentDiv = document.getElementById('p-recent-activity');
    if (recentDiv) {
      if (vs.length > 0) {
        recentDiv.innerHTML = vs.slice(0, 3).map(v => `
          <div class="tl-item">
            <div class="tl-date">${formatDate(v.date)}</div>
            <div class="tl-content">
              <div class="tl-title">${v.diagnosis || 'Visit'}</div>
              <div class="tl-sub">${v.chiefComplaint || ''}</div>
            </div>
          </div>
        `).join('');
      } else {
        recentDiv.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No visits recorded yet.</p></div>`;
      }
    }
    
    updatePatientNav(p);
  }

  function renderPatientHistory() {
    const p = DB.getPatient();
    const vs = DB.getVisits(p.roll);
    const container = document.getElementById('p-history-list');
    
    if (container) {
      if (vs.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No visits recorded yet.</p></div>`;
        return;
      }
      
      container.innerHTML = vs.map(v => `
        <div class="tl-item">
          <div class="tl-dot-col"><div class="tl-dot ${v.severity === 'emergency' ? 'red' : v.severity === 'severe' ? 'amber' : 'green'}"></div></div>
          <div class="tl-date">${formatDate(v.date)}</div>
          <div class="tl-content">
            <div class="tl-title">${v.diagnosis || 'Medical Visit'}</div>
            <div class="tl-sub">${v.chiefComplaint || ''}</div>
            <div class="tl-doctor">Dr. ${v.doctor || 'Mehra'} · ${v.vitals || ''}</div>
          </div>
        </div>
      `).join('');
    }
  }

  function renderMedList() {
    const p = DB.getPatient();
    const container = document.getElementById('p-med-list');
    
    if (container) {
      if (!p.medications || p.medications.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">💊</div><p>No medications logged yet.</p></div>`;
        return;
      }
      
      container.innerHTML = p.medications.map(m => `
        <div class="med-item">
          <div>
            <div class="med-name">${m.name} ${m.dosage}</div>
            <div class="med-detail">${m.frequency} · For: ${m.for || '—'}</div>
          </div>
          <div class="med-status">
            <span class="tag ${m.status === 'active' ? 'tag-green' : 'tag-gray'}">${m.status}</span>
          </div>
        </div>
      `).join('');
    }
  }

  function renderAllergyList() {
    const p = DB.getPatient();
    const container = document.getElementById('p-allergy-list');
    
    if (container) {
      if (!p.allergies || p.allergies.length === 0) {
        container.innerHTML = '';
        return;
      }
      
      container.innerHTML = p.allergies.map(a => `
        <div class="allergy-chip">
          ⚠ ${a.name}
          <span class="tag tag-${a.severity === 'severe' ? 'red' : 'amber'}" style="margin-left:4px;">${a.severity}</span>
          <span class="rm" onclick="removeAllergy('${a.name}')">✕</span>
        </div>
      `).join('');
    }
  }

  function addAllergy() {
    const input = document.getElementById('allergy-input');
    const severity = document.getElementById('allergy-severity');
    const name = input.value.trim();
    
    if (!name) {
      showToast('Enter an allergy name', 'red');
      return;
    }
    
    const p = DB.getPatient();
    if (!p.allergies) p.allergies = [];
    
    if (p.allergies.find(a => a.name.toLowerCase() === name.toLowerCase())) {
      showToast('Allergy already exists', 'amber');
      return;
    }
    
    p.allergies.push({ name, severity: severity.value });
    DB.savePatient(p);
    
    input.value = '';
    renderAllergyList();
    showToast('Allergy added', 'green');
  }

  window.removeAllergy = function(name) {
    const p = DB.getPatient();
    p.allergies = p.allergies.filter(a => a.name !== name);
    DB.savePatient(p);
    renderAllergyList();
    showToast('Allergy removed', 'green');
  };

  function renderQR() {
    const p = DB.getPatient();
    const qrDiv = document.getElementById('qr-visual');
    const previewDiv = document.getElementById('qr-preview-info');
    
    if (qrDiv) {
      // Simple QR-like grid (visual representation)
      qrDiv.innerHTML = `
        <div class="qr-grid">
          ${Array(49).fill(0).map(() => Math.random() > 0.5 ? '<div class="qr-cell b"></div>' : '<div class="qr-cell w"></div>').join('')}
        </div>
        <div style="font-family:monospace;margin-top:8px;font-size:12px;">${p.roll || 'SETUP_PROFILE'}</div>
      `;
    }
    
    if (previewDiv) {
      if (p.name && p.roll) {
        previewDiv.innerHTML = `
          <div><strong>${p.name}</strong></div>
          <div style="font-size:0.8rem;color:var(--text2);">${p.roll} · ${p.blood || 'Blood group not set'}</div>
          <div style="margin-top:8px;">${p.allergies?.length ? '⚠ Allergies: ' + p.allergies.map(a=>a.name).join(', ') : 'No known allergies'}</div>
          <div>Emergency: ${p.ecName || 'Not set'} ${p.ecPhone || ''}</div>
        `;
      } else {
        previewDiv.innerHTML = `<div class="empty"><p>Set up your profile first to see what shows on your QR.</p></div>`;
      }
    }
  }

  function openMedModal() {
    document.getElementById('med-modal').classList.add('open');
  }

  function saveMedication() {
    const name = document.getElementById('med-name').value.trim();
    const dose = document.getElementById('med-dose').value.trim();
    const freq = document.getElementById('med-freq').value;
    const status = document.getElementById('med-status').value;
    const medFor = document.getElementById('med-for').value.trim();
    
    if (!name) {
      showToast('Medication name required', 'red');
      return;
    }
    
    const p = DB.getPatient();
    if (!p.medications) p.medications = [];
    
    p.medications.push({
      name, dosage: dose, frequency: freq, status, for: medFor,
      startDate: new Date().toISOString()
    });
    
    DB.savePatient(p);
    closeModal('med-modal');
    renderMedList();
    showToast('Medication saved', 'green');
    
    // Clear form
    document.getElementById('med-name').value = '';
    document.getElementById('med-dose').value = '';
    document.getElementById('med-for').value = '';
  }

  // 9. DOCTOR PORTAL FUNCTIONS
  function loadDoctorPortal() {
    loadDoctorDashboard();
  }

  async function loadDoctorDashboard() {
    try {
      const patientsSnap = await getDocs(collection(db, "patients"));
      const visitsSnap = await getDocs(collection(db, "visits"));
      
      const patientCount = patientsSnap.size;
      const visitCount = visitsSnap.size;
      
      let allergyCount = 0;
      let activeMeds = 0;
      
      patientsSnap.forEach(doc => {
        const p = doc.data();
        if (p.allergies?.length) allergyCount++;
        if (p.medications) {
          activeMeds += p.medications.filter(m => m.status === 'active').length;
        }
      });
      
      document.getElementById('d-stat-patients').textContent = patientCount;
      document.getElementById('d-stat-visits').textContent = visitCount;
      document.getElementById('d-stat-allergies').textContent = allergyCount;
      document.getElementById('d-stat-active').textContent = activeMeds;
      
      // Recent patients
      const recentDiv = document.getElementById('d-recent-patients');
      if (recentDiv && patientCount > 0) {
        const patients = [];
        patientsSnap.forEach(doc => patients.push(doc.data()));
        
        recentDiv.innerHTML = patients.slice(0, 5).map(p => `
          <div class="patient-row" onclick="viewPatientDetail('${p.roll}')">
            <div class="pat-av">${initials(p.name)}</div>
            <div style="flex:1;">
              <div class="pat-name">${p.name}</div>
              <div class="pat-meta">${p.roll} · ${p.blood || '—'}</div>
            </div>
          </div>
        `).join('');
      }
    } catch (e) {
      console.error("Dashboard error:", e);
    }
  }

  async function scanPatient() {
    const roll = document.getElementById('scan-roll-input').value.trim().toUpperCase();
    const result = document.getElementById('scan-result');
    
    if (!roll) { 
      showToast('Enter a roll number', 'red'); 
      return; 
    }

    showToast('Searching database...', 'blue');

    try {
      const docSnap = await getDoc(doc(db, "patients", roll));

      if (docSnap.exists()) {
        const p = docSnap.data();
        currentViewingPatient = p;
        result.style.display = 'block';
        result.innerHTML = buildPatientDetailCard(p);
        showToast('Patient found!', 'green');
      } else {
        result.style.display = 'block';
        result.innerHTML = `<div class="card"><div class="empty"><p>No patient found with roll number "${roll}"</p><button class="btn btn-primary btn-sm" onclick="createNewPatient('${roll}')">Create New Patient</button></div></div>`;
        showToast('Patient not found', 'amber');
      }
    } catch (e) {
      console.error("Scan error:", e);
      showToast('Error searching: ' + e.message, 'red');
    }
  }

  function buildPatientDetailCard(p) {
    const vs = DB.getVisits(p.roll);
    
    return `
      <div class="profile-hero">
        <div class="profile-hero-top">
          <div class="profile-av">${initials(p.name)}</div>
          <div>
            <div class="profile-name">${p.name}</div>
            <div class="profile-meta">${p.roll} · ${p.blood || 'Blood group not set'} · ${p.gender || ''}</div>
            <div class="profile-tags">
              ${p.allergies?.length ? `<span class="tag tag-red">⚠ ${p.allergies.length} allergies</span>` : ''}
              ${p.conditions ? `<span class="tag tag-amber">${p.conditions.split(',')[0]}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="profile-quick">
          <div class="pq-item"><div class="pq-label">Allergies</div><div class="pq-val ${p.allergies?.length ? 'danger' : 'ok'}">${p.allergies?.length || 'None'}</div></div>
          <div class="pq-item"><div class="pq-label">Conditions</div><div class="pq-val">${p.conditions ? p.conditions.split(',').length : '0'}</div></div>
          <div class="pq-item"><div class="pq-label">Visits</div><div class="pq-val">${vs.length}</div></div>
          <div class="pq-item"><div class="pq-label">Emergency Contact</div><div class="pq-val">${p.ecName || '—'}</div></div>
          <div class="pq-item"><div class="pq-label">Blood Group</div><div class="pq-val">${p.blood || '—'}</div></div>
        </div>
      </div>
      
      ${p.allergies?.length ? `
        <div class="conflict-box">
          <div class="conflict-icon">⚠️</div>
          <div class="conflict-text">
            <strong>Allergy Alert</strong>
            ${p.allergies.map(a => `${a.name} (${a.severity})`).join(' · ')}
          </div>
        </div>
      ` : ''}
      
      <div class="grid2" style="margin-top:1rem;">
        <div class="card">
          <div class="card-title">Recent Visits</div>
          ${vs.length > 0 ? vs.slice(0, 3).map(v => `
            <div class="tl-item">
              <div class="tl-date">${formatDate(v.date)}</div>
              <div class="tl-content">
                <div class="tl-title">${v.diagnosis || 'Visit'}</div>
                <div class="tl-sub">${v.chiefComplaint || ''}</div>
              </div>
            </div>
          `).join('') : '<p class="empty">No visits recorded</p>'}
        </div>
        <div class="card">
          <div class="card-title">Current Medications</div>
          ${p.medications?.filter(m => m.status === 'active').map(m => `
            <div class="med-item">
              <div><span class="med-name">${m.name}</span> <span class="med-detail">${m.dosage}</span></div>
              <div class="med-detail">${m.frequency}</div>
            </div>
          `).join('') || '<p class="empty">No active medications</p>'}
        </div>
      </div>
      
      <div style="display:flex;gap:10px;margin-top:1rem;">
        <button class="btn btn-primary" onclick="openVisitModal('${p.roll}')">📋 Log Visit</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Print Summary</button>
      </div>
    `;
  }

  window.createNewPatient = function(roll) {
    const p = {
      name: '',
      roll: roll,
      dob: '',
      gender: '',
      blood: '',
      height: '',
      weight: '',
      ecName: '',
      ecPhone: '',
      ecRel: '',
      conditions: '',
      notes: '',
      allergies: [],
      medications: []
    };
    
    // Open a form or redirect
    showToast('Create patient profile in Patient Portal', 'blue');
  };

  async function renderPatientList() {
    const container = document.getElementById('d-patient-list');
    const searchInput = document.getElementById('pat-search');
    const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
    
    if (!container) return;
    
    container.innerHTML = '<div class="empty">Loading patients...</div>';

    try {
      const querySnapshot = await getDocs(collection(db, "patients"));
      
      if (querySnapshot.empty) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><p>No patients registered yet.</p></div>';
        return;
      }

      const patients = [];
      querySnapshot.forEach(doc => patients.push(doc.data()));
      
      const filtered = patients.filter(p => 
        !searchTerm || 
        p.name?.toLowerCase().includes(searchTerm) || 
        p.roll?.toLowerCase().includes(searchTerm)
      );
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty"><p>No matching patients</p></div>';
        return;
      }
      
      container.innerHTML = filtered.map(p => `
        <div class="patient-row" onclick="viewPatientDetail('${p.roll}')">
          <div class="pat-av">${initials(p.name)}</div>
          <div style="flex:1;">
            <div class="pat-name">${p.name}</div>
            <div class="pat-meta">${p.roll} · ${p.blood || '—'} · ${p.gender || ''}</div>
          </div>
          <div class="pat-right">
            <div class="pat-last">${p.allergies?.length ? '⚠ Allergies' : ''}</div>
          </div>
        </div>
      `).join('');
      
    } catch (e) {
      console.error("List error:", e);
      container.innerHTML = '<div class="empty"><p>Error loading patients</p></div>';
    }
  }

  window.viewPatientDetail = async function(roll) {
    try {
      const docSnap = await getDoc(doc(db, "patients", roll.toUpperCase()));
      if (docSnap.exists()) {
        const p = docSnap.data();
        currentViewingPatient = p;
        const modal = document.getElementById('patient-detail-modal');
        const content = document.getElementById('patient-detail-content');
        content.innerHTML = buildPatientDetailCard(p);
        modal.classList.add('open');
      }
    } catch (e) {
      console.error("View error:", e);
    }
  };

  function renderVisitLog() {
    const container = document.getElementById('d-visit-log');
    if (!container) return;
    
    const visits = DB.getVisits();
    
    if (visits.length === 0) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>No visits logged yet.</p></div>';
      return;
    }
    
    container.innerHTML = visits.map(v => `
      <div class="tl-item">
        <div class="tl-dot-col"><div class="tl-dot ${v.severity === 'emergency' ? 'red' : v.severity === 'severe' ? 'amber' : 'green'}"></div></div>
        <div class="tl-date">${formatDate(v.date)}</div>
        <div class="tl-content">
          <div class="tl-title">${v.patientName || v.roll} · ${v.diagnosis || 'Visit'}</div>
          <div class="tl-sub">${v.chiefComplaint || ''}</div>
          <div class="tl-doctor">Dr. ${v.doctor || 'Mehra'}</div>
        </div>
      </div>
    `).join('');
  }

  window.openVisitModal = function(roll) {
    visitTargetRoll = roll;
    document.getElementById('visit-modal-sub').textContent = `Recording visit for ${roll}`;
    document.getElementById('v-rx-list').innerHTML = '';
    rxRowCount = 0;
    document.getElementById('visit-modal').classList.add('open');
  };

  window.addRxRow = function() {
    const container = document.getElementById('v-rx-list');
    const id = rxRowCount++;
    container.innerHTML += `
      <div class="form-row" id="rx-${id}" style="margin-bottom:4px;">
        <input class="form-input" placeholder="Medication" id="rx-name-${id}" style="flex:2;">
        <input class="form-input" placeholder="Dose" id="rx-dose-${id}" style="flex:1;">
        <input class="form-input" placeholder="Freq" id="rx-freq-${id}" style="flex:1;">
        <button class="btn-ghost btn-sm" onclick="document.getElementById('rx-${id}').remove()">✕</button>
      </div>
    `;
  };

  async function saveVisit() {
    if (!visitTargetRoll) {
      showToast('No patient selected', 'red');
      return;
    }
    
    const visit = {
      id: 'v_' + Date.now(),
      roll: visitTargetRoll,
      patientName: currentViewingPatient?.name || '',
      date: new Date().toISOString(),
      chiefComplaint: document.getElementById('v-complaint')?.value || '',
      diagnosis: document.getElementById('v-diagnosis')?.value || '',
      severity: document.getElementById('v-severity')?.value || 'mild',
      vitals: `T:${document.getElementById('v-temp')?.value || '—'} BP:${document.getElementById('v-bp')?.value || '—'} HR:${document.getElementById('v-hr')?.value || '—'}`,
      notes: document.getElementById('v-notes')?.value || '',
      doctor: 'Mehra',
      prescriptions: []
    };
    
    // Collect prescriptions
    for (let i = 0; i < rxRowCount; i++) {
      const name = document.getElementById(`rx-name-${i}`)?.value;
      if (name) {
        visit.prescriptions.push({
          name,
          dose: document.getElementById(`rx-dose-${i}`)?.value || '',
          freq: document.getElementById(`rx-freq-${i}`)?.value || ''
        });
      }
    }
    
    DB.saveVisit(visit);
    
    // Also add to patient's medications if prescriptions exist
    if (currentViewingPatient && visit.prescriptions.length > 0) {
      if (!currentViewingPatient.medications) currentViewingPatient.medications = [];
      visit.prescriptions.forEach(rx => {
        currentViewingPatient.medications.push({
          name: rx.name,
          dosage: rx.dose,
          frequency: rx.freq,
          status: 'active',
          for: visit.diagnosis,
          startDate: new Date().toISOString(),
          prescribedBy: 'Dr. Mehra'
        });
      });
      
      // Update patient in cloud
      try {
        await setDoc(doc(db, "patients", visitTargetRoll.toUpperCase()), currentViewingPatient);
      } catch (e) {
        console.error("Failed to update patient meds:", e);
      }
    }
    
    closeModal('visit-modal');
    showToast('Visit saved successfully', 'green');
    
    // Refresh displays
    if (currentPortal === 'd') {
      loadDoctorDashboard();
    }
  }

  // 10. EXPOSE ALL FUNCTIONS TO WINDOW
  window.enterPortal = enterPortal;
  window.goHome = goHome;
  window.showPage = showPage;
  window.saveProfile = saveProfile;
  window.loadProfileFields = loadProfileFields;
  window.scanPatient = scanPatient;
  window.renderPatientList = renderPatientList;
  window.closeModal = closeModal;
  window.openMedModal = openMedModal;
  window.saveMedication = saveMedication;
  window.addAllergy = addAllergy;
  window.renderAllergyList = renderAllergyList;
  window.openVisitModal = openVisitModal;
  window.addRxRow = addRxRow;
  window.saveVisit = saveVisit;

  // Initialize
  console.log("🚀 PulseID ready with Firebase!");
</script>
